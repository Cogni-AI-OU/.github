---
# Note: Keep keys and envs in alphabetical order.
name: Check
# yamllint disable-line rule:truthy
on:
  pull_request:
  push:
  schedule:
    - cron: 0 0 * * 1  # Run every Monday at 00:00 UTC
  workflow_call:
  workflow_dispatch:
  workflow_run:
    workflows:
      - OpenCode
      - OpenCode Review
    types:
      - completed
permissions:
  contents: read
jobs:
  actionlint:
    name: actionlint
    # Skip if triggered by workflow_run and the triggering workflow failed
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          # For workflow_run, checkout the head branch from the triggering workflow
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}
      - name: Add Problem Matcher for actionlint
        run: |
          echo "::add-matcher::.github/actionlint-matcher.json"
        shell: bash
      - uses: reviewdog/action-actionlint@v1
  link-checker:
    name: Link Checker
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}
      - name: Restore lychee cache
        uses: actions/cache@v5.0.1
        with:
          key: cache-lychee-${{ github.sha }}
          path: .lycheecache
          restore-keys: |
            cache-lychee-
      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --cache --max-cache-age 1d --verbose --no-progress './**/*.md'
          fail: true
  pre-commit:
    name: Pre-commit
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}
      - uses: actions/cache@v5.0.1
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit|
      - uses: actions/setup-python@v6.1.0
        with:
          python-version: '3.12'
      - name: Add Problem Matcher for pre-commit
        run: |
          echo "::add-matcher::.github/pre-commit-matcher.json"
        shell: bash
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --color=never
